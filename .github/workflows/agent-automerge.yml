name: Agent Auto-Merge

on:
  pull_request_target:
    types:
      - labeled
      - ready_for_review
      - reopened
      - synchronize
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  actions: read

jobs:
  on-pull-request:
    if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.draft == false && contains(join(github.event.pull_request.labels.*.name, ','), 'agent/automerge') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge labeled PR when it is already green
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/enable_automerge.sh "${{ github.event.pull_request.number }}"

  on-ci-success:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge labeled PR after CI succeeds
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          if [[ -z "${PR_NUMBER}" ]]; then
            echo "No pull request is associated with this CI run."
            exit 0
          fi

          ./scripts/enable_automerge.sh "${PR_NUMBER}"
